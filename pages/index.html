    <h2>Cadastro de Carro</h2>

    <form action="#" method="post"></form>
    
    <label for="marca">Marca</label>
    <input type="text" id="marca" name="marca" required><br><br>

    <label for ="modelo">Modelo</label>
    <input type="text" id="modelo" name="modelo" required><br><br>

    <label for="Ano">Ano</label>
    <input type="number" id="ano" name="ano" min="1900" max="3000" required><br><br>

    <label for="Cor">Cor</label>
    <input type="text" id="cor" name="cor" required><br><br>
   
    <label for="Placa">Placa</label>
    <input type="text" id="placa" name="placa" required><br><br>

    <input type="submit" value="cadastrar">

    <h2>Cadastro do cliente</h2>

    <form action="#" method="post"></form>
    
    <label for="Nome">Nome</label>
    <input type="text" id="Nome" name="Nome" required><br><br>

    <label for ="cpf">cpf</label>
    <input type="number" id="cpf" name="cpf" min="11" max="11" required><br><br>

    <label for="Datadenascimento">Data de nascimento</label>
    <input type="date" id="Datadenascimento" name="Datadenascimento" required><br><br>


    <input type="submit" value="cadastrar">
